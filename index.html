<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carta para mi Borreguita 💛</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(#fff9c4, #ffe082);
    font-family: 'Arial', sans-serif;
    overflow: hidden;
}

/* Carta */
.carta {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    text-align: center;
    animation: aparecer 2s ease;
}

@keyframes aparecer {
    from {opacity: 0; transform: translate(-50%, -60%);}
    to {opacity: 1; transform: translate(-50%, -50%);}
}

h1 {
    color: #fbc02d;
}

p {
    color: #555;
    font-size: 18px;
}

/* Flores cayendo */
.flor {
    position: absolute;
    top: -50px;
    animation: caer linear infinite;
}

.flor img {
    width: 35px;
}

@keyframes caer {
    to {
        transform: translateY(100vh);
    }
}
</style>
</head>

<body>

<div class="carta">
    <h1>🌷 Para mi Borreguita hermosa 💛</h1>
    <p>
        Las flores más preciosas para mi Borreguita hermosa 🌷💛<br><br>
        Te amo hasta el infinito y más allá ✨💛<br><br>
        Eres la razón de mi sonrisa todos los días 😊
    </p>
</div>

<script>
// Crear flores cayendo
function crearFlor() {
    const flor = document.createElement("div");
    flor.classList.add("flor");

    flor.innerHTML = '<img src="https://cdn-icons-png.flaticon.com/512/765/765674.png">';

    flor.style.left = Math.random() * window.innerWidth + "px";
    flor.style.animationDuration = (Math.random() * 3 + 2) + "s";
    
    document.body.appendChild(flor);

    setTimeout(() => {
        flor.remove();
    }, 5000);
}

// Generar flores continuamente
setInterval(crearFlor, 300);
</script>

</body>
</html>
