<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carta para mi Borreguita 💛</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(#fff9c4, #ffe082);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* SOBRE */
.sobre {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 220px;
    height: 150px;
    background: #fbc02d;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Tapa del sobre */
.tapa {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fdd835;
    clip-path: polygon(0 0, 50% 60%, 100% 0);
    transform-origin: top;
    transition: 1s;
}

/* Carta */
.carta {
    position: absolute;
    width: 260px;
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -200%);
    opacity: 0;
    transition: 1s;
}

h1 {
    color: #fbc02d;
}

p {
    color: #555;
}

/* FLORES */
.flor {
    position: absolute;
    top: -60px;
    animation: caer linear infinite;
}

.flor img {
    width: 40px;
}

@keyframes caer {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<!-- SOBRE -->
<div class="sobre" onclick="abrirCarta()">
    <div class="tapa" id="tapa"></div>
    💌
</div>

<!-- CARTA -->
<div class="carta" id="carta">
    <h1>🌷 Para mi Borreguita hermosa 💛</h1>
    <p>
        Las flores más preciosas para mi Borreguita hermosa 🌷💛<br><br>
        Te amo hasta el infinito y más allá ✨💛<br><br>
        Eres la razón de mi sonrisa todos los días 😊
    </p>
</div>

<script>
// 💌 Abrir carta
function abrirCarta() {
    document.getElementById("tapa").style.transform = "rotateX(180deg)";
    
    setTimeout(() => {
        const carta = document.getElementById("carta");
        carta.style.opacity = "1";
        carta.style.transform = "translate(-50%, -50%)";
    }, 500);

    iniciarFlores();
}

// 🌷 Tulipanes amarillos
const imagenTulipan = "https://cdn-icons-png.flaticon.com/512/616/616490.png";
function crearFlor() {
    const flor = document.createElement("div");
    flor.classList.add("flor");

    flor.innerHTML = `<img src="${imagenTulipan}">`;

    flor.style.left = Math.random() * window.innerWidth + "px";
    flor.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(flor);

    setTimeout(() => {
        flor.remove();
    }, 6000);
}

function iniciarFlores() {
    setInterval(crearFlor, 400);
}
</script>

</body>
</html>
