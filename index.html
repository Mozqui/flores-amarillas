<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to top, #fff9c4, #ffe082);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: Arial;
}

/* 🌷 tulipanes */
.tulipan {
    position: absolute;
    top: -50px;
    font-size: 28px;
    animation: caer linear infinite;
}

@keyframes caer {
    to {
        transform: translateY(110vh);
    }
}

/* 💌 sobre */
.sobre {
    width: 240px;
    height: 160px;
    background: #fbc02d;
    position: relative;
    cursor: pointer;
    border-radius: 12px;
}

.tapa {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #f9a825;
    transform-origin: top;
    transition: 1s;
}

.carta {
    position: absolute;
    width: 210px;
    height: 130px;
    background: white;
    top: 15px;
    left: 15px;
    border-radius: 12px;
    text-align: center;
    padding: 12px;
    transform: translateY(100%);
    transition: 1s;
}

.abierto .tapa {
    transform: rotateX(180deg);
}

.abierto .carta {
    transform: translateY(0);
}
</style>

</head>

<body>

<!-- 💌 sobre -->
<div class="sobre" onclick="abrir()">
    <div class="tapa"></div>
    <div class="carta">
        <h2>Para mi Borreguita 💛</h2>
        <p>
            Las flores más preciosas para mi Borreguita hermosa 🌷💛<br><br>
            Quiero que sepas que te amo hasta el infinito ♾️✨<br><br>
            Siempre estarás en mi corazón 💖
        </p>
    </div>
</div>

<script>
function abrir() {
    document.querySelector(".sobre").classList.toggle("abierto");

    // 🌷 crear tulipanes cayendo
    for (let i = 0; i < 30; i++) {
        let tulipan = document.createElement("div");
        tulipan.className = "tulipan";
        tulipan.innerHTML = "🌷";
        tulipan.style.left = Math.random() * 100 + "vw";
        tulipan.style.animationDuration = (3 + Math.random() * 5) + "s";
        document.body.appendChild(tulipan);
    }
}
</script>

</body>
</html>
